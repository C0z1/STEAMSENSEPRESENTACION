services:
  - type: web
    name: steamsense-backend
    runtime: python
    pythonVersion: "3.11.9"
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: ENV
        value: production
      - key: DUCKDB_PATH
        value: /data/steamsense.duckdb
      - key: DUCKDB_MEMORY_LIMIT
        value: 512MB
      - key: DUCKDB_THREADS
        value: "2"
      - key: TOP_N_GAMES
        value: "200"
      - key: REQUEST_BATCH_SIZE
        value: "10"
      - key: REQUEST_DELAY
        value: "0.5"
      - key: ITAD_COUNTRY
        value: US
      - key: ITAD_HISTORY_SINCE
        value: "2022-01-01T00:00:00Z"
      - key: STEAM_API_KEY
        sync: false
      - key: ITAD_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
    disk:
      name: steamsense-data
      mountPath: /data
      sizeGB: 1
